<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Glutenor | Restaurantes sin gluten en Tarragona</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #111;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      margin-top: 10px;
      opacity: 0.8;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .tag {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>Glutenor</h1>
  <p>Guía de restaurantes sin gluten en Tarragona</p>
</header>

<div class="container">

  <h2>🍽️ Restaurantes recomendados</h2>

  <div class="card">
    <h3>Ejemplo Restaurante 1</h3>
    <span class="tag">Sin gluten</span>
    <p>Tarragona · Opciones seguras para celíacos.</p>
  </div>

  <div class="card">
    <h3>Ejemplo Restaurante 2</h3>
    <span class="tag">Opciones sin gluten</span>
    <p>Tarragona · Cocina adaptada con cuidado.</p>
  </div>

</div>

</body>
</html>
